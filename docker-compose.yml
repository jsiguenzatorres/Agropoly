version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - server
    command: pnpm --filter @agropoly/web dev

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "2567:2567"
      - "3000:3000"
    volumes:
      - ./apps/server:/app/apps/server
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: pnpm --filter @agropoly/server dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
